<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c3e50">
    <title>大富翁桌游助手</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 启动页面 -->
        <div id="start-screen" class="screen active">
            <h1>🎲 大富翁桌游助手</h1>
            <p class="subtitle">配合实体地图，多人一起玩！</p>
            
            <div class="player-setup">
                <h3>选择玩家数量</h3>
                <div class="player-count-buttons">
                    <button class="player-count-btn" data-count="2">2人</button>
                    <button class="player-count-btn" data-count="3">3人</button>
                    <button class="player-count-btn active" data-count="4">4人</button>
                </div>
                
                <h3 style="margin-top: 20px;">初始资金设置</h3>
                <div class="starting-money">
                    <label for="starting-money">每位玩家初始资金 (元):</label>
                    <input type="number" id="starting-money" value="10000" min="1000" max="100000" step="1000">
                </div>
                
                <div class="player-names" id="player-names">
                </div>
            </div>
            
            <button id="start-game" class="btn primary">开始游戏</button>
        </div>
        
        <!-- 游戏主页面 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="turn-indicator" id="turn-indicator">
                    <span id="current-player-name">玩家1</span> 的回合
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="speech-btn" class="btn small" title="语音开关">🔊</button>
                    <button id="toggle-board-btn" class="btn small" title="显示/隐藏棋盘">🎲</button>
                    <button id="menu-btn" class="btn small">菜单</button>
                </div>
            </div>
            
            <div class="game-layout">
                <!-- 左侧：棋盘位置 -->
                <div id="left-panel" class="left-panel">
                    <div class="position-area">
                        <h3>📍 棋盘位置</h3>
                        <div class="board-container">
                            <div class="board-top" id="board-top"></div>
                            <div class="board-middle">
                                <div class="board-left" id="board-left"></div>
                                <div class="board-center">
                                    <div class="center-decoration">
                                        <div class="center-facilities">
                                            <div class="facility jail-facility" id="jail-facility">
                                                <div class="facility-icon">🛑</div>
                                                <div class="facility-name">监狱</div>
                                            </div>
                                            <div class="center-title">
                                                <span style="font-size:42px;line-height:1;">🎲</span>
                                            </div>
                                            <div class="facility hospital-facility" id="hospital-facility">
                                                <div class="facility-icon">🏥</div>
                                                <div class="facility-name">医院</div>
                                            </div>
                                        </div>
                                        <div class="center-text">
                                            <div style="font-size:24px;font-weight:bold;color:#5d4e37;text-shadow:2px 2px 4px rgba(0,0,0,0.1);">大富翁</div>
                                            <div style="font-size:14px;color:#7a6a52;margin-top:8px;line-height:1.6;">一起玩游戏吧！</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="board-right" id="board-right"></div>
                            </div>
                            <div class="board-bottom" id="board-bottom"></div>
                        </div>
                        <p class="hint">摇骰子后自动移动到对应位置，只有当前位置可购买或建房</p>
                    </div>
                </div>
                
                <!-- 右侧：游戏控制 -->
                <div id="right-panel" class="right-panel">
                    <!-- 玩家状态栏 -->
                    <div class="players-status" id="players-status">
                    </div>
                    
                    <!-- 骰子区域 -->
                    <div class="dice-area">
                        <div class="dice-scene" id="dice-scene">
                            <div class="dice-cube" id="dice" data-face="1">
                                <div class="dice-face face-1"><span></span></div>
                                <div class="dice-face face-2"><span></span><span></span></div>
                                <div class="dice-face face-3"><span></span><span></span><span></span></div>
                                <div class="dice-face face-4"><span></span><span></span><span></span><span></span></div>
                                <div class="dice-face face-5"><span></span><span></span><span></span><span></span><span></span></div>
                                <div class="dice-face face-6"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                            </div>
                        </div>
                        <p class="dice-hint">点击骰子摇一摇</p>
                        <button id="end-turn" class="btn secondary" style="width: 100%; margin-top: 15px;">结束回合</button>
                    </div>
                    
                    <!-- 当前格子信息 -->
                    <div class="cell-info" id="cell-info">
                        <h3 id="cell-name">起点</h3>
                        <p id="cell-description">游戏开始的地方</p>
                        <div id="cell-actions" class="cell-actions">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 菜单弹窗 -->
        <div id="menu-modal" class="modal">
            <div class="modal-content">
                <h2>游戏菜单</h2>
                <button id="resume-game" class="btn">继续游戏</button>
                <button id="save-game" class="btn">保存游戏</button>
                <button id="restart-game" class="btn danger">重新开始</button>
            </div>
        </div>
        
        <!-- 事件弹窗 -->
        <div id="event-modal" class="modal">
            <div class="modal-content">
                <h2 id="event-title">事件</h2>
                <p id="event-description">描述</p>
                <button id="event-confirm" class="btn primary">确定</button>
            </div>
        </div>
        
        <!-- 购买确认弹窗 -->
        <div id="purchase-modal" class="modal">
            <div class="modal-content">
                <h2 id="purchase-title">购买地产</h2>
                <p id="purchase-description">描述</p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="purchase-confirm" class="btn primary">购买</button>
                    <button id="purchase-cancel" class="btn">取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
